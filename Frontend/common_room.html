<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Lounge | DAC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f8fafc; font-family: sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; padding: 60px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; max-width: 500px; }
        .icon-circle { width: 100px; height: 100px; background: #6366f1; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; font-size: 3rem; }
        h1 { color: #1e293b; margin-bottom: 20px; }
        .tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .tag { background: #f1f5f9; padding: 8px 15px; border-radius: 8px; font-size: 0.9rem; color: #475569; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-circle"><i class="fa-solid fa-couch"></i></div>
        <h1>Student Common Room</h1>
        <p>A dedicated space for interaction, periodicals, and relaxation between sessions.</p>
        <div class="tags">
            <div class="tag">Table Tennis</div>
            <div class="tag">Daily News</div>
            <div class="tag">Chess</div>
            <div class="tag">Discussion Hub</div>
        </div>
    </div>
</body>
</html>
