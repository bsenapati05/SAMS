<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Lab | DAC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --cyan: #06b6d4; }
        body { background: #020617; color: #94a3b8; font-family: 'Consolas', monospace; padding: 50px; }
        .container { max-width: 900px; margin: auto; border: 1px solid var(--cyan); border-radius: 15px; padding: 40px; box-shadow: 0 0 30px rgba(6,182,212,0.1); }
        h1 { color: #fff; border-bottom: 2px solid var(--cyan); display: inline-block; padding-bottom: 10px; }
        .specs { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .spec-box { background: rgba(6,182,212,0.05); padding: 20px; border-radius: 10px; border-left: 4px solid var(--cyan); }
        b { color: var(--cyan); }
    </style>
</head>
<body>
    <div class="container">
        <h1>$ system_info --lab</h1>
        <p style="margin-top: 20px;">Dhenkanal Autonomous College IT Infrastructure</p>
        <div class="specs">
            <div class="spec-box"><b>OS:</b> Ubuntu 24.04 LTS</div>
            <div class="spec-box"><b>CPU:</b> Intel i7 / 16GB RAM</div>
            <div class="spec-box"><b>NET:</b> 100Mbps Leased Line</div>
            <div class="spec-box"><b>SRV:</b> Samba File Sharing</div>
        </div>
        <p style="margin-top: 40px; color: #fff;">// Status: Operational</p>
    </div>
</body>
</html>
