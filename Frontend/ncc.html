<!DOCTYPE html>
<html lang="en">
<head>

    <title>Athletics & NCC | DAC</title>

    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; }
        .side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: 0.5s; }

        h2 { font-size: 3rem; text-transform: uppercase; }
        p { max-width: 300px; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="side sports">
        <i class="fa-solid fa-trophy"></i>
        <h2>Sports</h2>
        <p>Inter-college football, cricket tournaments, and indoor gaming facilities.</p>
    </div>
    <div class="side ncc">
        <i class="fa-solid fa-person-military-pointing"></i>
        <h2>NCC</h2>
        <p>12 (O) BN NCC Unit. Unity and Discipline. Preparing for Republic Day Camps.</p>
    </div>

</html>
