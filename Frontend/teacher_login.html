<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faculty Portal | Dhenkanal Autonomous College</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      /* 1. Global Setup */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      }

      body {
        background: #09090b; /* Modern Deep Black */
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
      }

      /* Animated Background Orbs for Modern Look */
      body::before, body::after {
        content: '';
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        filter: blur(100px);
        z-index: -1;
        opacity: 0.4;
      }
      body::before { background: #6a11cb; top: -10%; left: -10%; }
      body::after { background: #ff00cc; bottom: -10%; right: -10%; }

      /* 2. Main Card */
      .card {
        width: 1000px;
        height: 600px;
        display: flex;
        border-radius: 30px;
        overflow: hidden;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        background: #111113;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* 3. Left Side: Content */
      .left-side {
        flex: 1.2;
        padding: 60px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        color: white;
        background: linear-gradient(135deg, rgba(106, 17, 203, 0.8) 0%, rgba(37, 117, 252, 0.8) 100%), 
                    url('https://images.unsplash.com/photo-1524178232363-1fb2b075b655?auto=format&fit=crop&q=80');
        background-blend-mode: overlay;
        background-size: cover;
        position: relative;
      }

      .welcome-text h1 {
        font-size: 3.5rem;
        font-weight: 800;
        line-height: 1.1;
        margin-bottom: 24px;
        background: linear-gradient(to right, #fff, #a5a5a5);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .welcome-text p {
        font-size: 1.1rem;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.8);
        max-width: 400px;
        border-left: 3px solid #ff00cc;
        padding-left: 20px;
      }

      /* 4. Right Side: Login Form */
      .right-side {
        flex: 1;
        padding: 60px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: #111113;
      }

      .form-header {
        margin-bottom: 40px;
      }

      .form-header h2 {
        color: white;
        font-size: 1.8rem;
        margin-bottom: 8px;
      }

      .form-header p {
        color: #71717a;
        font-size: 0.9rem;
      }

      #errorBox {
        display: none;
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
        padding: 14px;
        margin-bottom: 20px;
        border-radius: 12px;
        font-size: 0.85rem;
        border: 1px solid rgba(239, 68, 68, 0.2);
        animation: shake 0.4s ease-in-out;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
      }

      form { width: 100%; }

      .input-box {
        position: relative;
        margin-bottom: 20px;
      }

      .input-box i.main-icon {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        color: #52525b;
        font-size: 1rem;
      }

      .toggle-password {
        position: absolute;
        right: 18px;
        top: 50%;
        transform: translateY(-50%);
        color: #52525b;
        cursor: pointer;
        z-index: 10;
      }

      .input-box input {
        width: 100%;
        background: #18181b;
        border: 1px solid #27272a;
        border-radius: 12px;
        padding: 16px 50px;
        color: white;
        font-size: 0.95rem;
        outline: none;
        transition: all 0.3s;
      }

      .input-box input:focus {
        border-color: #ff00cc;
        background: #1c1c20;
        box-shadow: 0 0 0 4px rgba(255, 0, 204, 0.1);
      }

      .login-submit {
        width: 100%;
        padding: 16px;
        border-radius: 12px;
        border: none;
        background: white;
        color: black;
        font-weight: 700;
        cursor: pointer;
        font-size: 1rem;
        transition: 0.3s;
        margin-top: 10px;
      }

      .login-submit:hover {
        background: #ff00cc;
        color: white;
        transform: translateY(-2px);
      }

      .options {
        display: flex;
        justify-content: space-between;
        margin-top: 25px;
        font-size: 0.85rem;
      }

      .options label {
        color: #a1a1aa;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .options a {
        color: #ff00cc;
        text-decoration: none;
        font-weight: 600;
      }

      .options a:hover {
        text-decoration: underline;
      }

      .options input[type="checkbox"] {
        accent-color: #ff00cc;
      }

      /* Responsive */
      @media (max-width: 900px) {
        .card { width: 95%; height: auto; flex-direction: column; }
        .left-side { padding: 40px; display: none; }
        .right-side { padding: 40px; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="left-side">
        <div class="welcome-text">
          <h1>Faculty<br>Dashboard.</h1>
          <p>
            An intelligent workspace for modern educators. Manage department workflows, student metrics, and administrative tasks with precision.
          </p>
        </div>
      </div>

      <div class="right-side">
        <div class="form-header">
            <h2>Welcome back</h2>
            <p>Please enter your professional credentials.</p>
        </div>

        <div id="errorBox"></div>

        <form id="loginForm" method="POST" action="/SMS/Backend/teacher_login.php">
          <div class="input-box">
            <i class="fa-solid fa-id-badge main-icon"></i>
            <input
              type="text"
              name="teacher_id"
              placeholder="Teacher ID"
              required
            />
          </div>

          <div class="input-box">
            <i class="fa-solid fa-key main-icon"></i>
            <input
              type="password"
              name="password"
              id="password"
              placeholder="Password"
              required
            />
            <i
              class="fa-solid fa-eye-slash toggle-password"
              id="togglePassword"
            ></i>
          </div>

          <button type="submit" class="login-submit">Sign In</button>

          <div class="options">
            <label><input type="checkbox" /> Stay Signed In</label>
            <a href="/SMS/Backend/forget_password.php">Recovery Access</a>
          </div>
        </form>
      </div>
    </div>

    <script>
      /* 1. Toggle Password Visibility */
      const togglePassword = document.querySelector("#togglePassword");
      const passwordField = document.querySelector("#password");

      togglePassword.addEventListener("click", function () {
        const type =
          passwordField.getAttribute("type") === "password"
            ? "text"
            : "password";
        passwordField.setAttribute("type", type);
        this.classList.toggle("fa-eye");
        this.classList.toggle("fa-eye-slash");
      });

      /* 2. Loading State on Submit */
      document
        .getElementById("loginForm")
        .addEventListener("submit", function () {
          const btn = document.querySelector(".login-submit");
          btn.innerHTML =
            '<i class="fa-solid fa-circle-notch fa-spin"></i> Authenticating...';
          btn.style.opacity = "0.8";
          btn.style.pointerEvents = "none";
        });

      /* 3. Integrated Error Handling */
      const urlParams = new URLSearchParams(window.location.search);
      const errorBox = document.getElementById("errorBox");
      const errorType = urlParams.get("error");

      if (errorType) {
        errorBox.style.display = "block";

        if (errorType === "wrong_password") {
          errorBox.innerText = "Security Alert: Incorrect password entered.";
        } else if (errorType === "invalid_id") {
          errorBox.innerText = "System Error: Teacher ID not recognized.";
        } else if (errorType === "1") {
          errorBox.innerText = "Access Denied: Invalid credentials.";
        }

        window.history.replaceState(
          {},
          document.title,
          window.location.pathname,
        );
      }
    </script>
  </body>
</html>
